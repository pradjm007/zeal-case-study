apiVersion: 1

datasources:
  - name: ClickHouse
    type: grafana-clickhouse-datasource
    uid: clickhouse-ds
    jsonData:
      host: clickhouse
      port: 9000
      username: default
      defaultDatabase: default
      protocol: http
    secureJsonData:
      password: "clickhouse"
    editable: true
    isDefault: true