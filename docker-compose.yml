version: '3.8'

volumes:
  telemetry_data:
  clickhouse_data:
  grafana_data:

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 5s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      bash -c "
      kafka-topics --create --if-not-exists --topic telemetry --bootstrap-server kafka:9092 --partitions 1 --replication-factor 1 &&
      echo 'Telemetry topic created successfully'
      "

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      - kafka-init

  processor:
    build: ./processor
    depends_on:
      - kafka-init
      - clickhouse
    environment:
      KAFKA_BROKER: kafka:9092
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: 9000
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse    
    volumes:
      - ./checkpoints:/checkpoints  

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse    
    volumes:
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 10s
      retries: 5

  clickhouse-ui:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - clickhouse
    environment:
      ADMINER_DEFAULT_SERVER: clickhouse

  grafana:
      image: grafana/grafana:10.4.3
      ports:
        - "3001:3000"
      environment:
        GF_SECURITY_ADMIN_PASSWORD: admin
        GF_SECURITY_ADMIN_USER: admin
        GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
        GF_PLUGIN_ADMIN_ENABLED: "true"
        GF_PROVISIONING_UPDATE_MIGRATION_STATE: "true"
      depends_on:
        - clickhouse
      volumes:
        - grafana_data:/var/lib/grafana
        - ./grafana/dashboard.json:/etc/grafana/provisioning/dashboards/dashboard.json
        - ./grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml

  client:
    build: ./client
    ports:
      - "3000:80"